{% extends 'base.html' %}
{% load static %}
{% block title %}Новости{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/news_list.css' %}">
{% endblock %}
{% block content %}
{% for item in news_listik %}

<section>
    <a href="/news/<int:pk>/)">
        <img src="{{ item.img.url }}">
        <h2>{{ item.title }}</h2>
        <h4>{{ item.text|truncatechars:200 }}</h4>
    </a>
</section>

{% endfor %}

{% endblock %}
