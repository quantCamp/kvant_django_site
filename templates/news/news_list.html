{% extends "base.html" %}

{% load static %}

{% block title %}Новости{% endblock %}

{% block extra_head %}<link rel="stylesheet" href="{% static 'css/news_list.css' %}">{% endblock %}

{% block content %}
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <a href="news_list.html" class="logo">
                <i class="fas fa-newspaper"></i>
                <h1>Новости</h1>
            </a>
            <nav class="nav-links">
                <a href="news_list.html" class="active"><i class="fas fa-list"></i> Список</a>
                <a href="detail"><i class="fas fa-eye"></i> Детали</a>
                <a href="add" class="btn-add"><i class="fas fa-plus"></i> Добавить</a>
            </nav>
        </header>



        <!-- Список новостей -->
        <div class="news-grid">
            <!-- Новость 1 -->
            {% for news in news %}
                <li class="News-card">
                    <a href="detail/{{ news.id }}">
                        <span class="news-title">{{ news.title }}</span>
                    </a>
                </li>
            {% endfor %}
{% endblock %}
