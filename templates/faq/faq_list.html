<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>часто задаваемые вопросы</title>
</head>
<body>

{% for category in categories %}
<h1>{{ category.name }}</h1>
<ul>
    {% for item in category.items.all %}
    <li>{{ item.question }} - {{ item.answer }}</li>
    {% endfor %}
</ul>
{% endfor %}


</body>
</html>
