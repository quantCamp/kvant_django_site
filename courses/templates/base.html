<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Лагерь Квант{% endblock %}</title>
    <!-- Подключаем Bootstrap для сетки и базовых компонентов -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Подключаем ваш собственный файл стилей -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Шапка сайта (Навигация) -->
    <nav class="navbar navbar-expand-lg kvant-navbar shadow-sm">
        <div class="container">
            <a class="navbar-brand logo-text" href="{% url 'courses:course_list' %}">⛺ Квант</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'courses:course_list' %}">Курсы</a>
                    </li>
                    <!-- Сюда другие ученики вставят ссылки на свои вкладки -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент страницы -->
    <main class="content-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Подвал сайта -->
    <footer class="kvant-footer text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Лагерь «Квант». Сделано школьниками для школьников.</p>
        </div>
    </footer>

    <!-- Скрипты Bootstrap -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
