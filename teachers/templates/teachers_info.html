{% extends 'basa.html' %}

{% block title %} {{ teacher.first_name }} {% endblock %}

{% load static %}

{% block content %} 
  <div class="teacher-card" role="main" aria-label="Карточка учителя">
    
    <!-- аватар / инициалы -->
    <div class="avatar">
      <div class="avatar-circle">
        <!-- <img src="{{ teacher.img.url }}" alt="Логотип" width="90px"> аватар и бд -->
      </div>
    </div>

    <!-- Имя -->
    <div class="info-field">
      <span class="label">👤 Имя</span>
      <span class="value" id="teacherName">{{ teacher.first_name }}</span>
    </div>

    <!-- Курс (предмет / дисциплина) -->
    <div class="info-field">
    
      <span class="label">📚 Курс</span>
      {% for course in teacher.courses %}
      <span class="value" id="teacherCourse">{{ course.name }}</span>
      {% endfor %}
    </div>

    <!-- Возраст -->
    <div class="info-field">
      <span class="label">🎂 Возраст</span>
      <span class="value age-value" id="teacherAge">
        {{ teacher.age }} <small>года</small>
      </span>
    </div>

    <!-- декоративный элемент + маленький бейдж (необязательно, но добавляет акцент) -->
    <div class="badge-row">
      <span class="badge">⭐ преподаватель</span>
    </div>

    <div class="divider-light"></div>

  </div>
{% endblock %}
